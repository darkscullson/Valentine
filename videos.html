<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéos — Valentine</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav">
  <div class="nav-logo" onclick="window.location='index.html'">V A L E N T I N E</div>

  <div class="nav-links">
    <a href="index.html" class="nav-link">Accueil</a>
    <a href="galerie.html" class="nav-link">Galerie</a>
    <a href="videos.html" class="nav-link active">Vidéos</a>
    <a href="messages.html" class="nav-link">Messages</a>
  </div>

  <div class="nav-burger" onclick="toggleMenu()">
    <i class="fa fa-bars"></i>
  </div>
</nav>

<div class="page-header">
  <h1>Vidéos <em>& moments</em></h1>
  <p class="page-desc">Tous les moments filmés, partagés avec amour</p>
</div>

<div class="filter-bar">
  <button class="btn primary" style="margin-left:auto;" onclick="toggleAddForm()">
    <i class="fa fa-plus"></i> Ajouter une vidéo
  </button>
</div>

<div class="videos-container">

  <div class="video-add-form" id="add-form">

    <div class="form-row">
      <div class="form-field">
        <label>Titre</label>
        <input type="text" id="v-title">
      </div>

      <div class="form-field">
        <label>Groupe</label>
        <select id="v-group"></select>
      </div>
    </div>

    <div class="form-field form-full" style="margin-bottom:10px;">
      <label>Lien YouTube</label>
      <input type="text" id="v-url">
    </div>

    <div class="form-actions">
      <button class="btn" onclick="toggleAddForm()">Annuler</button>

      <button class="btn primary" onclick="addVideo()">
        Ajouter
      </button>
    </div>

  </div>

  <div id="videos-root"></div>

</div>

<div class="video-modal" id="video-modal" onclick="closeVideoModal()">
  <div class="video-modal-inner" onclick="event.stopPropagation()">

    <div class="video-modal-header">
      <div class="video-modal-title"></div>

      <div class="modal-close" onclick="closeVideoModal()">
        <i class="fa fa-times"></i>
      </div>
    </div>

    <div class="video-embed"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

<script>

let vidFilter = 'all';

async function buildFilters() {

  const sel = document.getElementById('v-group');

  sel.innerHTML = GROUPS.map(g => `
    <option value="${g.id}">
      ${g.icon} ${g.label}
    </option>
  `).join('');
}

async function renderVideos() {

  const root = document.getElementById('videos-root');

  let vids = await getVideos();

  if (vids.length === 0) {

    root.innerHTML = `
      <div class="empty-state">
        Aucune vidéo pour l'instant.
      </div>
    `;

    return;
  }

  root.innerHTML = vids.map(v => {

    const thumb = getYtThumb(v.url);

    return `
      <div class="video-card fade-in"
           onclick='openVideoModal(${JSON.stringify(v).replace(/'/g, "&apos;")})'>

        <div class="video-thumb">
          <img src="${thumb}">
          <div class="video-play-btn">
            <i class="fa fa-play"></i>
          </div>
        </div>

        <div class="video-info">

          <div class="video-title">
            ${v.title}
          </div>

          <div class="video-meta">
            <span class="video-tag">
              ${getGroupIcon(v.group)}
              ${getGroupLabel(v.group)}
            </span>
          </div>

        </div>

      </div>
    `;

  }).join('');
}

function toggleAddForm() {

  document
    .getElementById('add-form')
    .classList
    .toggle('open');
}

async function addVideo() {

  const title =
    document.getElementById('v-title').value.trim();

  const group =
    document.getElementById('v-group').value;

  const url =
    document.getElementById('v-url').value.trim();

  if (!title || !url) return;

  await saveVideo({
    title,
    group,
    url
  });

  document.getElementById('v-title').value = '';
  document.getElementById('v-url').value = '';

  toggleAddForm();

  await renderVideos();
}

(async () => {

  await buildFilters();
  await renderVideos();

})();

</script>

</body>
</html>
